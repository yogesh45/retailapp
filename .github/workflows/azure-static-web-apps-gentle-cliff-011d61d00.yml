name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      github.event.action != 'closed')

    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://retail-pricing-api-yogesh45.azurewebsites.net/api/v1
        run: npm run build

      - name: Verify exported frontend
        run: |
          ls -la ./frontend/out
          test -f ./frontend/out/index.html

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_CLIFF_011D61D00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend/out"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'

    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Azure preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_CLIFF_011D61D00 }}
          action: "close"